name: Scraper cron

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FRANCE_TRAVAIL_API_URL: ${{ secrets.FRANCE_TRAVAIL_API_URL }}
          FRANCE_TRAVAIL_API_KEY: ${{ secrets.FRANCE_TRAVAIL_API_KEY }}
          FRANCE_TRAVAIL_API_KEY_HEADER: ${{ secrets.FRANCE_TRAVAIL_API_KEY_HEADER }}
          FRANCE_TRAVAIL_BEARER_TOKEN: ${{ secrets.FRANCE_TRAVAIL_BEARER_TOKEN }}
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
        run: python -m scraper.main

      - name: Notify on failure
        if: failure()
        run: echo "Scraper failed - check logs"
