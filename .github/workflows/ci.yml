name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  scraper-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scraper/requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 scraper/

      - name: SAST (Bandit)
        run: bandit -r scraper/ -ll --exit-zero

      - name: Tests (pytest + coverage)
        run: |
          pytest scraper/tests/ --cov=scraper --cov-report=xml
          coverage report --fail-under=70

  security:
    runs-on: ubuntu-latest
    needs: [scraper-lint-test]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker scraper (test)
        run: docker build -t alternancehub-scraper:test ./scraper

      - name: Scan CVE image scraper (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "alternancehub-scraper:test"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Generate SARIF report (Trivy)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: "alternancehub-scraper:test"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  web-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Tests
        run: npm run test:ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
